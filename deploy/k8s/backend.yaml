apiVersion: apps/v1
kind: Deployment
metadata:
  name: abs-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abs-backend
  template:
    metadata:
      labels:
        app: abs-backend
    spec:
      containers:
        - name: backend
          image: abs-iip-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: abs-secrets
                  key: database_url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: abs-secrets
                  key: jwt_secret
            - name: REDIS_URL
              value: redis://abs-redis:6379/0
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: abs-backend
spec:
  selector:
    app: abs-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: abs-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: abs-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
