apiVersion: apps/v1
kind: Deployment
metadata:
  name: abs-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abs-frontend
  template:
    metadata:
      labels:
        app: abs-frontend
    spec:
      containers:
        - name: frontend
          image: abs-iip-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: http://abs-backend:8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: abs-frontend
spec:
  selector:
    app: abs-frontend
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: abs-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: abs-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
