version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: abs_iip
      POSTGRES_USER: abs
      POSTGRES_PASSWORD: abs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://abs:abs@db:5432/abs_iip
      REDIS_URL: redis://redis:6379/0
      DEFAULT_REPORT_DIR: /app/reports
    depends_on:
      - db
      - redis
    volumes:
      - backend_reports:/app/reports
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_reports:
